<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Neuronas Kids{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<header class="bg-white border-bottom shadow-sm py-3 mb-4">
    <div class="container d-flex justify-content-end align-items-center">
        {% if session['usuario'] %}
        <div>
            <span class="text-muted me-3">👤 {{ session['usuario'] }}</span>
            <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-danger">Cerrar sesión</a>
        </div>
        {% endif %}
    </div>
</header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 mt-5 border-top">
        <small>© 2025 Neuronas Kids. Todos los derechos reservados.</small>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
